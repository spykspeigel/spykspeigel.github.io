---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    <link rel="stylesheet" href="{{ base_path }}/assets/css/profile-home.css">
  </head>

  <body class="profile-home">
    <main class="profile-shell">
      {% include profile-nav.html %}

      <article class="profile-page">
        <header class="profile-page-header">
          <h1>{{ page.title }}</h1>
          {% if page.excerpt %}
            <p>{{ page.excerpt }}</p>
          {% endif %}
        </header>

        <div class="profile-page-content archive">
          {{ content }}
        </div>
      </article>
    </main>
  </body>
</html>
